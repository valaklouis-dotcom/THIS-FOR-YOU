<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>💖 Love Cinematic 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Quicksand',sans-serif;
  background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fbc2eb,#a18cd1);
  background-size:400% 400%;
  animation:bg 12s ease infinite;
  overflow:hidden;
  color:white;
  text-align:center;
}

@keyframes bg{
  0%{background-position:0%}
  50%{background-position:100%}
  100%{background-position:0%}
}

.page{
  position:absolute;
  width:100%;
  top:50%;
  transform:translateY(-50%);
  opacity:0;
  transition:.6s;
}

.active{
  opacity:1;
}

h1{
  font-family:'Great Vibes',cursive;
  font-size:clamp(30px,6vw,60px);
}

button{
  padding:12px 20px;
  border:none;
  border-radius:25px;
  background:#ff69b4;
  color:white;
  cursor:pointer;
  margin-top:20px;
}

/* PET */
.pet{
  width:140px;
  margin:10px;
  animation:float 3s ease-in-out infinite;
}

@keyframes float{
  0%{transform:translateY(0)}
  50%{transform:translateY(-10px)}
  100%{transform:translateY(0)}
}

/* CHAT */
.chat{
  position:fixed;
  bottom:15px;
  left:50%;
  transform:translateX(-50%);
  width:90%;
  max-width:420px;
  display:flex;
  flex-direction:column;
  gap:8px;
}

.msg{
  display:flex;
  align-items:flex-end;
  opacity:0;
  transform:translateY(10px);
  transition:.4s;
}

.msg.show{
  opacity:1;
  transform:translateY(0);
}

.msg img{
  width:30px;
  height:30px;
  border-radius:50%;
  margin-right:6px;
}

.bubble{
  background:#ff4da6;
  padding:10px 14px;
  border-radius:18px;
  max-width:75%;
}
</style>
</head>

<body>

<!-- PAGE 1 -->
<div class="page active" id="p1">
  <h1>💖 Chào người em yêu 💖</h1>
  <p>Nhấn để bắt đầu nha</p>

  <!-- GIF ỔN ĐỊNH -->
  <img class="pet" src="https://i.imgur.com/4AiXzf8.gif">
  <img class="pet" src="https://i.imgur.com/IdaK4hF.gif">

  <br>
  <button onclick="start()">💘 Bắt đầu</button>
</div>

<!-- PAGE 2 -->
<div class="page" id="p2">
  <h1>Anh có thương em không?</h1>
  <button onclick="next('p3')">Anh có 💖</button>
  <button onclick="next('p3')">Nào dám trả lời 😏</button>
</div>

<!-- PAGE 9 -->
<div class="page" id="p9">
  <h1>💖 Em thương anh nhiều 💖</h1>
</div>

<div class="chat" id="chat"></div>

<script>

// NHẠC (CLICK MỚI CHẠY)
let music = new Audio("https://cdn.pixabay.com/audio/2022/03/15/audio_8f8d2cfba1.mp3");
music.loop = true;

function start(){
  music.play().catch(()=>{});
  next('p2');
}

// CHUYỂN TRANG
function next(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  story(id);
}

// CHAT
let chat=document.getElementById("chat");

function addMsg(text){
  let row=document.createElement("div");
  row.className="msg";

  let av=document.createElement("img");
  av.src="https://i.imgur.com/6VBx3io.png";

  let bubble=document.createElement("div");
  bubble.className="bubble";

  row.appendChild(av);
  row.appendChild(bubble);
  chat.appendChild(row);

  setTimeout(()=>row.classList.add("show"),50);

  let i=0;
  let t=setInterval(()=>{
    bubble.innerHTML+=text[i];
    i++;
    if(i>=text.length) clearInterval(t);
  },25);
}

// STORY
function story(p){
  if(p==="p2"){
    setTimeout(()=>addMsg("Anh có thương em không? 😏"),500);
  }
}

// TIM RƠI (NHẸ - KHÔNG LAG)
setInterval(()=>{
  let h=document.createElement("div");
  h.innerHTML="💖";
  h.style.position="fixed";
  h.style.left=Math.random()*100+"vw";
  h.style.top="-10px";
  document.body.appendChild(h);

  let fall=setInterval(()=>{
    let t=parseFloat(h.style.top||0);
    h.style.top=(t+2)+"px";

    if(t>window.innerHeight){
      h.remove();
      clearInterval(fall);
    }
  },40);
},600);

</script>

</body>
</html><!DOCTYPE html>
